<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>ponoi</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    background:#0B0E14; color:#fff;
    font-family:'Segoe UI', system-ui, sans-serif;
    border-radius:12px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    -webkit-app-region: drag;
    animation: appear .35s ease both;
    position:relative;
  }
  @keyframes appear { from { opacity:0 } to { opacity:1 } }
  body.bye { animation: bye .3s ease both; }
  @keyframes bye { to { opacity:0; transform:scale(.96) } }

  /* Едва заметная неоновая сетка на фоне */
  body::before {
    content:''; position:absolute; inset:0; opacity:.10; border-radius:12px;
    background-image:linear-gradient(rgba(99,102,241,.5) 1px, transparent 1px),
                     linear-gradient(90deg, rgba(99,102,241,.5) 1px, transparent 1px);
    background-size:26px 26px;
    mask-image:radial-gradient(ellipse at 50% 42%, #000 25%, transparent 72%);
    -webkit-mask-image:radial-gradient(ellipse at 50% 42%, #000 25%, transparent 72%);
  }

  .logo {
    font-size:44px; font-weight:800; letter-spacing:1px; position:relative; z-index:1;
    text-shadow:0 0 14px rgba(99,102,241,.9), 0 0 40px rgba(99,102,241,.55);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { text-shadow:0 0 14px rgba(99,102,241,.9), 0 0 40px rgba(99,102,241,.55) }
    50%     { text-shadow:0 0 20px rgba(99,102,241,1), 0 0 60px rgba(99,102,241,.8) }
  }

  .status {
    margin-top:32px; font-size:11.5px; font-weight:600; letter-spacing:2px;
    color:#94A3B8; text-transform:uppercase; position:relative; z-index:1;
    min-height:16px; text-align:center;
  }

  .bar {
    margin-top:14px; width:200px; height:4px; border-radius:99px;
    background:rgba(148,163,184,.14); overflow:hidden; position:relative; z-index:1;
    opacity:0; transition:opacity .3s;
  }
  .bar.on { opacity:1 }
  .fill {
    height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg,#6366F1,#8b5cf6);
    box-shadow:0 0 10px rgba(99,102,241,.8);
    transition:width .35s ease-out;
  }
</style>
</head>
<body>
  <div class="logo">ponoi</div>
  <div class="status" id="status">Запуск</div>
  <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
<script>
  // Честный сплэш: никакого выдуманного прогресса и слова «Установка».
  // Полоса появляется только когда реально качается обновление.
  const status = document.getElementById('status')
  const bar = document.getElementById('bar')
  const fill = document.getElementById('fill')
  let updating = false, dots = 0, label = 'Запуск'
  setTimeout(() => { if (!updating) label = 'Ещё секунду' }, 12000)
  const dotTick = setInterval(() => {
    if (updating) return
    dots = (dots + 1) % 4
    status.textContent = label + '.'.repeat(dots)
  }, 450)
  window.ponoiSplash?.onProgress((data) => {
    updating = true
    bar.classList.add('on')
    const p = Math.round(data.percent || 0)
    fill.style.width = p + '%'
    status.textContent = 'Скачиваем обновление ' + p + '%'
  })
  window.ponoiSplash?.onDone(() => {
    clearInterval(dotTick); updating = true
    bar.classList.remove('on')
    status.textContent = 'Готово'
    setTimeout(() => document.body.classList.add('bye'), 150)
  })
</script>
</body>
</html>
