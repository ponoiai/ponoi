<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>ponoi</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    background:#0B0E14; color:#fff;
    font-family:'Segoe UI', system-ui, sans-serif;
    border-radius:12px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    -webkit-app-region: drag;
    animation: appear .35s ease both;
    position:relative;
  }
  @keyframes appear { from { opacity:0 } to { opacity:1 } }
  body.bye { animation: bye .3s ease both; }
  @keyframes bye { to { opacity:0; transform:scale(.96) } }

  /* Едва заметная неоновая сетка на фоне */
  body::before {
    content:''; position:absolute; inset:0; opacity:.10; border-radius:12px;
    background-image:linear-gradient(rgba(99,102,241,.5) 1px, transparent 1px),
                     linear-gradient(90deg, rgba(99,102,241,.5) 1px, transparent 1px);
    background-size:26px 26px;
    mask-image:radial-gradient(ellipse at 50% 42%, #000 25%, transparent 72%);
    -webkit-mask-image:radial-gradient(ellipse at 50% 42%, #000 25%, transparent 72%);
  }

  /* v1.190.0: мягкое сияние отдельным слоем позади иконки — раньше это был
     drop-shadow прямо по силуэту лого, из-за которого пульс выглядел резким
     двойным контуром. Теперь просто дышащий радиальный ореол под иконкой,
     тон в тон с самим лого (тот же индиго, что сетка/полоса прогресса). */
  .logo-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
  .halo {
    position:absolute; z-index:0; width:210px; height:210px; border-radius:50%;
    top:50%; left:50%;
    background:radial-gradient(circle, rgba(99,102,241,.5) 0%, rgba(99,102,241,.16) 45%, transparent 72%);
    animation: breathe 3.6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity:.7; transform:translate(-50%,-50%) scale(1); }
    50%     { opacity:1; transform:translate(-50%,-50%) scale(1.08); }
  }
  .logo {
    width:76px; height:76px; position:relative; z-index:1; border-radius:50%;
    filter:drop-shadow(0 6px 20px rgba(0,0,0,.35));
  }

  .status {
    margin-top:32px; font-size:11.5px; font-weight:600; letter-spacing:2px;
    color:#94A3B8; text-transform:uppercase; position:relative; z-index:1;
    min-height:16px; text-align:center;
  }

  .bar {
    margin-top:14px; width:200px; height:4px; border-radius:99px;
    background:rgba(148,163,184,.14); overflow:hidden; position:relative; z-index:1;
    opacity:0; transition:opacity .3s;
  }
  .bar.on { opacity:1 }
  .fill {
    height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg,#6366F1,#8b5cf6);
    box-shadow:0 0 10px rgba(99,102,241,.8);
    transition:width .35s ease-out;
  }
</style>
</head>
<body>
  <div class="logo-wrap">
    <div class="halo"></div>
    <img class="logo" id="logo" src="./icon.png" alt="Ponoi">
  </div>
  <div class="status" id="status">Запуск</div>
  <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
<script>
  // v1.160.0: свой логотип (если загружен в настройках) — main-процесс передаёт
  // file:// путь к сохранённому PNG через query-параметр, сам сплэш ничего не решает.
  try {
    const iconUrl = new URLSearchParams(location.search).get('icon')
    if (iconUrl) document.getElementById('logo').src = iconUrl
  } catch {}
  // Честный сплэш: никакого выдуманного прогресса и слова «Установка».
  // Полоса появляется только когда реально качается обновление.
  const status = document.getElementById('status')
  const bar = document.getElementById('bar')
  const fill = document.getElementById('fill')
  let updating = false, dots = 0, label = 'Запуск'
  setTimeout(() => { if (!updating) label = 'Ещё секунду' }, 12000)
  const dotTick = setInterval(() => {
    if (updating) return
    dots = (dots + 1) % 4
    status.textContent = label + '.'.repeat(dots)
  }, 450)
  window.ponoiSplash?.onProgress((data) => {
    updating = true
    bar.classList.add('on')
    const p = Math.round(data.percent || 0)
    fill.style.width = p + '%'
    status.textContent = 'Скачиваем обновление ' + p + '%'
  })
  window.ponoiSplash?.onDone(() => {
    clearInterval(dotTick); updating = true
    bar.classList.remove('on')
    status.textContent = 'Готово'
    setTimeout(() => document.body.classList.add('bye'), 150)
  })
</script>
</body>
</html>
