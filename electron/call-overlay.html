<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>ponoi call overlay</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html, body { background:transparent; overflow:hidden; font-family:'Segoe UI', system-ui, sans-serif; }
  #panel { display:flex; flex-direction:column; gap:2px; padding:6px; }
  .row {
    display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:8px;
    background:rgba(17,18,20,.78); backdrop-filter:blur(2px);
    box-shadow:0 2px 10px rgba(0,0,0,.35); transition:box-shadow .12s ease;
    animation:in .18s ease both;
  }
  @keyframes in { from { opacity:0; transform:translateX(-10px) } to { opacity:1; transform:none } }
  .row.speaking { box-shadow:0 0 0 2px #23a55a, 0 2px 10px rgba(0,0,0,.35); }
  .av {
    width:26px; height:26px; border-radius:50%; flex:none; display:flex; align-items:center;
    justify-content:center; background:#5865f2; color:#fff; font-weight:700; font-size:12px;
  }
  .nm { color:#f2f3f5; font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; max-width:150px; }
  .mic { flex:none; width:16px; height:16px; display:flex; align-items:center; justify-content:center; }
  .mic svg { width:14px; height:14px; }
</style>
</head>
<body>
  <div id="panel"></div>
<script>
  var MIC_ON = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" fill="#b5bac1"/><path d="M6 11a1 1 0 1 0-2 0 8 8 0 0 0 7 7.94V21a1 1 0 1 0 2 0v-2.06A8 8 0 0 0 20 11a1 1 0 1 0-2 0 6 6 0 0 1-12 0Z" fill="#b5bac1"/></svg>'
  var MIC_OFF = '<svg viewBox="0 0 24 24" fill="none"><path d="M3 3l18 18" stroke="#ed4245" stroke-width="2" stroke-linecap="round"/><path d="M12 15a3 3 0 0 0 3-3V9.4M9 6.2V6a3 3 0 0 1 5.7-1.3" stroke="#ed4245" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M6 11a6 6 0 0 0 9.8 4.6M18 11a5.98 5.98 0 0 1-.5 2.4" stroke="#ed4245" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M12 18v3" stroke="#ed4245" stroke-width="2" stroke-linecap="round"/></svg>'
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c] }) }
  function render(list) {
    var panel = document.getElementById('panel')
    panel.innerHTML = (list || []).map(function (p) {
      var nm = esc(p.name || '?')
      var initial = esc((p.name || '?').slice(0, 1).toUpperCase())
      return '<div class="row' + (p.speaking ? ' speaking' : '') + '">' +
        '<span class="av">' + initial + '</span>' +
        '<span class="nm">' + nm + '</span>' +
        '<span class="mic">' + (p.micOn === false ? MIC_OFF : MIC_ON) + '</span>' +
        '</div>'
    }).join('')
  }
  window.ponoiCallOverlay && window.ponoiCallOverlay.onUpdate(render)
</script>
</body>
</html>
