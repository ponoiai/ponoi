<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#ff2fd1"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="30" fill="#0b0c10"/>
  <g fill="url(#neonGrad)" filter="url(#glow)">
    <circle cx="64" cy="78" r="19"/>
    <circle cx="36" cy="52" r="10.5"/>
    <circle cx="60" cy="34" r="10.5"/>
    <circle cx="88" cy="40" r="10.5"/>
    <circle cx="94" cy="66" r="10.5"/>
  </g>
</svg>
